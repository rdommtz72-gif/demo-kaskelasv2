<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — Kas Kelas</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<button class="auth-theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">
  <span id="themeToggleIcon"></span>
</button>

<div class="auth-wrap">
  <div class="auth-card">
    <img class="auth-logo" src="URL_LOGO_TEMPEL_DISINI.PNG" alt="Logo" width="72" height="72">
    <h1>Kas Kelas</h1>
    <p class="sub">Masuk untuk mengelola dan memantau kas kelas.</p>

    <div class="auth-error" id="authError">email atau kata sandi salah. Silakan coba lagi.</div>

    <form id="loginForm">
      <div class="field">
        <label for="email">email</label>
        <input type="text" id="email" placeholder="email" required>
      </div>
      <div class="field">
        <label for="password">kata sandi</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary" id="loginSubmitBtn">
        <span class="btn-spinner"></span>
        <span id="loginBtnLabel">Masuk</span>
      </button>
    </form>

    <div class="demo-hint">
      Admin: admin@kelas.com | admin123
    </div
      Siswa: siswa1@kelas.com | siswa123
    </div>
  </div>
</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/main.js"></script>
<script>
  document.getElementById('themeToggleIcon').innerHTML =
    document.documentElement.getAttribute('data-theme') === 'dark' ? ICONS.sun : ICONS.moon;

  // Already logged in? go straight to the right dashboard.
  const existingSession = DB.getSession();
  if (existingSession) window.location.href = existingSession.role === 'admin' ? 'admin.html' : 'student.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errBox = document.getElementById('authError');
    const submitBtn = document.getElementById('loginSubmitBtn');
    const btnLabel = document.getElementById('loginBtnLabel');
    submitBtn.disabled = true;
    submitBtn.classList.add('is-loading');
    btnLabel.textContent = 'Memeriksa…';
    try {
      const user = await DB.login(email, password);
      if (!user) { errBox.textContent = 'Email atau kata sandi salah. Silakan coba lagi.'; errBox.classList.add('show'); return; }
      errBox.classList.remove('show');
      window.location.href = user.role === 'admin' ? 'admin.html' : 'student.html';
    } catch (err) {
      errBox.textContent = 'Tidak bisa terhubung ke server. Periksa API_URL di assets/js/api.js.';
      errBox.classList.add('show');
    } finally {
      submitBtn.disabled = false;
      submitBtn.classList.remove('is-loading');
      btnLabel.textContent = 'Masuk';
    }
  });
</script>
</body>
</html>
